<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANGLIMA Downloader - TikTok Video Downloader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta name="theme-color" content="#6C3CE1">
    <meta name="description" content="Download video TikTok tanpa watermark dengan kualitas HD">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" />
            </svg>
            <div class="loader-text">PANGLIMA</div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-container">
                <img src="logo.svg" alt="PANGLIMA Logo" class="logo">
                <h1>PANGLIMA</h1>
            </div>
            <p class="subtitle">Downloader Video TikTok Tanpa Watermark</p>
        </header>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="Masukkan link TikTok..."
                    autocomplete="off"
                >
                <button id="downloadBtn" class="btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download
                </button>
            </div>
            <div class="input-hint">
                <span>📌 Contoh: https://www.tiktok.com/@username/video/123456789</span>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden">
            <span class="error-icon">⚠️</span>
            <span class="error-text"></span>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <span>Memproses video...</span>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="result-section hidden">
            <!-- Video Player -->
            <div class="video-container">
                <div class="video-wrapper">
                    <video id="videoPlayer" controls playsinline>
                        <source id="videoSource" src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                    <div class="video-controls">
                        <button id="playPauseBtn" class="play-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M8 5v14l11-7z" fill="white"/>
                            </svg>
                        </button>
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <span class="time-display">0:00 / 0:00</span>
                        <button id="fullscreenBtn" class="fullscreen-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="white"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Video Info -->
            <div class="video-info">
                <div class="info-header">
                    <img id="thumbnail" class="thumbnail" src="" alt="Thumbnail">
                    <div class="info-details">
                        <h3 id="videoTitle" class="video-title">Judul Video</h3>
                        <p id="videoAuthor" class="video-author">@username</p>
                        <div class="video-meta">
                            <span id="videoDuration" class="meta-item">⏱️ 0:00</span>
                            <span class="meta-item">📱 TikTok</span>
                        </div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button id="downloadVideoBtn" class="btn-download">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download Video
                    </button>
                    <button id="downloadAudioBtn" class="btn-audio">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
                            <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
                        </svg>
                        Download Audio
                    </button>
                </div>
            </div>

            <!-- Share Section -->
            <div class="share-section">
                <span class="share-label">Bagikan:</span>
                <div class="share-buttons">
                    <button onclick="shareLink('whatsapp')" class="share-btn whatsapp">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" fill="currentColor"/></svg>
                    </button>
                    <button onclick="shareLink('twitter')" class="share-btn twitter">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor"/></svg>
                    </button>
                    <button onclick="shareLink('facebook')" class="share-btn facebook">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="currentColor"/></svg>
                    </button>
                    <button onclick="copyLink()" class="share-btn copy">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 PANGLIMA Downloader. All rights reserved.</p>
            <p class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact</a>
            </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
