<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Download video TikTok tanpa watermark dengan cepat, aman, dan gratis. PANGLIMA Downloader - Download TikTok No Watermark HD.">
  <meta name="keywords" content="download tiktok, tiktok downloader, no watermark, video downloader, panglima downloader">
  <meta name="author" content="PANGLIMA">
  <meta property="og:title" content="PANGLIMA Downloader - TikTok No Watermark">
  <meta property="og:description" content="Download video TikTok tanpa watermark dengan cepat dan gratis. Kualitas HD, no watermark, dan dukungan MP3.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://panglima-downloader.vercel.app">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>PANGLIMA Downloader - TikTok No Watermark</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Particle Background -->
  <div id="particles"></div>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="nav">
        <div class="logo">
          <img src="/logo.svg" alt="PANGLIMA Downloader" width="40" height="40">
          <span>PANGLIMA</span>
        </div>
        <div class="nav-actions">
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
            <span class="sun">☀️</span>
            <span class="moon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <div class="hero-badge">
            ⚡ Gratis & Cepat
          </div>
          
          <h1 class="hero-title">
            <span class="typing-text">PANGLIMA Downloader</span>
          </h1>
          
          <p class="hero-subtitle">
            Download Video TikTok Tanpa Watermark Dengan Cepat, Aman, Gratis, dan Kualitas HD.
          </p>

          <!-- Download Form -->
          <div class="download-form glass-card">
            <div class="form-group">
              <div class="input-wrapper">
                <input 
                  type="url" 
                  id="videoUrl" 
                  placeholder="Masukkan link TikTok..." 
                  required
                  autocomplete="url"
                >
                <button id="pasteBtn" class="paste-btn" title="Tempel dari clipboard">
                  📋
                </button>
              </div>
              <button id="analyzeBtn" class="btn-primary btn-ripple">
                <span class="btn-text">🔍 Analyze</span>
              </button>
            </div>
            
            <!-- Progress Bar -->
            <div id="progressContainer" class="progress-container" style="display: none;">
              <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
              </div>
              <span id="progressText" class="progress-text">0%</span>
            </div>
          </div>

          <!-- Result Section -->
          <div id="resultSection" class="result-section" style="display: none;">
            <div class="result-card glass-card fade-in">
              <!-- Preview -->
              <div class="preview-container">
                <div class="video-preview">
                  <img id="thumbnail" src="" alt="Video thumbnail">
                  <div class="play-overlay">
                    <span>▶</span>
                  </div>
                </div>
                <div class="video-info">
                  <h3 id="videoTitle" class="video-title">Title</h3>
                  <p id="username" class="username">@username</p>
                  <p id="duration" class="duration">⏱️ 00:00</p>
                </div>
              </div>

              <!-- Download Options -->
              <div class="download-options">
                <button id="downloadVideoBtn" class="btn-download btn-primary">
                  <span>🎬 Download Video (No WM)</span>
                </button>
                <button id="downloadAudioBtn" class="btn-download btn-secondary">
                  <span>🎵 Download MP3</span>
                </button>
              </div>

              <!-- Copy Link -->
              <div class="copy-section">
                <input type="text" id="videoLinkInput" readonly value="">
                <button id="copyLinkBtn" class="copy-btn">📋 Salin Link</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- History Section -->
    <section class="history-section">
      <div class="container">
        <h2 class="section-title">📜 Riwayat Download</h2>
        <div id="historyList" class="history-list">
          <p class="empty-history">Belum ada riwayat download</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <span id="toastMessage">Success</span>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 PANGLIMA Downloader. Dibuat dengan ❤️</p>
      <p class="footer-credit">TikTok Downloader No Watermark</p>
    </div>
  </footer>

  <script src="/script.js"></script>
</body>
</html>
